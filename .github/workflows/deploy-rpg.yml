name: Deploy RPG to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/spark-rpg-game-6sjEH

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build RPG
        run: node_modules/.bin/vite build --config vite-rpg.config.ts

      - name: Assemble pages output
        run: |
          mkdir -p dist-pages/rpg
          cp -r dist-rpg/. dist-pages/rpg/
          cp examples/assets.json dist-pages/
          echo '<meta http-equiv="refresh" content="0;url=/spark/rpg/">' > dist-pages/index.html

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist-pages
          commit_message: "Deploy RPG – ${{ github.sha }}"
